bundle:
  name: doc-intel-10k

include:
  - resources/**/*.yml

variables:
  catalog:
    description: Unity Catalog name
    default: main
  schema:
    description: Schema for all 10-K Analyst resources
    default: docintel_10k
  workspace_host:
    description: Databricks workspace host (https://...)
    default: ""
  service_principal_id:
    description: Service Principal application ID for prod deploys
    default: ""
  embedding_model_endpoint_name:
    description: Mosaic AI embedding endpoint used by Vector Search
    default: databricks-bge-large-en
  foundation_model_endpoint_name:
    description: Foundation model endpoint used by the agent for generation
    default: databricks-meta-llama-3-3-70b-instruct
  rerank_model_endpoint_name:
    description: Mosaic AI re-ranker endpoint
    default: databricks-bge-rerank-v2
  quality_threshold:
    description: Minimum quality_score (0-30) required for embed_eligible
    default: 22
  top_k:
    description: Citations returned after re-rank
    default: 5
  max_pdf_bytes:
    description: Reject filings larger than this many bytes (50 MB)
    default: 52428800
  analyst_group:
    description: UC group granted SELECT/USE on the catalog/schema
    default: account users

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: ${var.workspace_host}
    variables:
      catalog: main
      schema: docintel_10k_dev

  prod:
    mode: production
    workspace:
      host: ${var.workspace_host}
    run_as:
      service_principal_name: ${var.service_principal_id}
    variables:
      catalog: main
      schema: docintel_10k
