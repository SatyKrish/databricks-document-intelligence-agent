resources:
  jobs:
    index_refresh:
      name: doc-intel-index-refresh-${bundle.target}

      trigger:
        table_update:
          table_names:
            - ${var.catalog}.${var.schema}.gold_filing_sections_indexable
          condition: ALL_UPDATED

      tasks:
        - task_key: sync_index
          spark_python_task:
            python_file: ../../jobs/index_refresh/sync_index.py
            parameters:
              - "--endpoint"
              - docintel-${bundle.target}
              - "--index"
              - ${var.catalog}.${var.schema}.filings_summary_idx
              - "--source-table"
              - ${var.catalog}.${var.schema}.gold_filing_sections_indexable
              - "--primary-key"
              - section_uid
              - "--embedding-endpoint"
              - ${var.embedding_model_endpoint_name}
          environment_key: sync_env

      environments:
        - environment_key: sync_env
          spec:
            client: "1"
            dependencies:
              - databricks-vectorsearch>=0.40
              - databricks-sdk>=0.40

      permissions:
        - level: CAN_VIEW
          group_name: ${var.analyst_group}
