resources:
  apps:
    analyst_app:
      name: doc-intel-analyst-${bundle.target}
      description: "10-K Analyst — chat over indexed filings with citations"
      source_code_path: ../../app

      # Databricks Apps auto-grants the declared permissions to the App SP
      # on deploy — see https://docs.databricks.com/aws/en/dev-tools/databricks-apps/access-data
      # Do NOT also grant manually.
      resources:
        - name: docintel-lakebase
          database:
            database_name: ${var.lakebase_instance}
            instance_name: ${var.lakebase_instance}
            permission: CAN_CONNECT_AND_CREATE
        - name: agent-endpoint
          serving_endpoint:
            name: analyst-agent-${bundle.target}
            permission: CAN_QUERY

      # Mandatory OBO scopes (Databricks Apps IAM/auth docs:
      # https://docs.databricks.com/aws/en/dev-tools/databricks-apps/iam-auth)
      # require the workspace-level "Databricks Apps - user token passthrough".
      # Deployment must fail if the workspace cannot grant these scopes.
      user_api_scopes:
        - serving.serving-endpoints
        - sql
        - iam.access-control:read
        - iam.current-user:read
