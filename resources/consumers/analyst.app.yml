resources:
  apps:
    analyst_app:
      name: doc-intel-analyst-${bundle.target}
      description: "10-K Analyst — chat over indexed filings with citations"
      source_code_path: ../../app

      config:
        env:
          - name: DOCINTEL_AGENT_ENDPOINT
            value: ${var.agent_endpoint_name}
          - name: DOCINTEL_OBO_REQUIRED
            value: ${var.app_obo_required}
          - name: DOCINTEL_LAKEBASE_INSTANCE
            value: ${var.lakebase_instance}

      # Databricks Apps auto-grants Lakebase permissions to the App SP on
      # deploy — see https://docs.databricks.com/aws/en/dev-tools/databricks-apps/access-data.
      # Agent Bricks endpoint access is granted outside this binding:
      # agent/document_intelligence_agent.py grants analyst users/groups, and
      # bootstrap/CI grants the App SP when demo runs with OBO disabled.
      resources:
        - name: docintel-lakebase
          database:
            database_name: ${var.lakebase_instance}
            instance_name: ${var.lakebase_instance}
            permission: CAN_CONNECT_AND_CREATE

      # Prod declares user_api_scopes in databricks.yml. Demo leaves them unset
      # so workspaces without Apps user-token passthrough can use App-SP calls.
