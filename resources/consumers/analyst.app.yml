resources:
  apps:
    analyst_app:
      name: doc-intel-analyst-${bundle.target}
      description: "10-K Analyst — chat over indexed filings with citations"
      source_code_path: ../../app

      # Skill: databricks-apps/references/platform-guide.md §"Service Principal
      # Permissions" — declaring resources here auto-grants the listed
      # permission to the App SP on deploy. Do NOT also grant manually.
      resources:
        - name: docintel-lakebase
          database:
            database_name: ${var.lakebase_instance}
            instance_name: ${var.lakebase_instance}
            permission: CAN_CONNECT_AND_CREATE
        - name: agent-endpoint
          serving_endpoint:
            name: analyst-agent-${bundle.target}
            permission: CAN_QUERY

      # OBO scopes (skill databricks-apps/references/platform-guide.md
      # §"Authentication") require the workspace-level "Databricks Apps -
      # user token passthrough" feature. If your workspace does NOT have
      # it enabled, DAB rejects this field with PERMISSION_DENIED at
      # deploy time — leave the block commented out and the app will fall
      # back to SP creds (with a loud bring-up banner). Uncomment after
      # a workspace admin enables the feature.
      #
      # Required scopes for this app's OBO call chain:
      #   serving.serving-endpoints   — invoke analyst-agent-${target} as the user
      #   sql                         — agent's tools.py runs UC SQL via warehouse
      #   iam.access-control:read     — default
      #   iam.current-user:read       — default
      #
      # The agent's pyfunc additionally calls Vector Search and downstream
      # serving endpoints; those resources/scopes are declared in MLflow's
      # auth_policy at log_model time (see agent/log_and_register.py
      # _auth_policy), not here.
      #
      # user_api_scopes:
      #   - serving.serving-endpoints
      #   - sql
      #   - iam.access-control:read
      #   - iam.current-user:read
