resources:
  schemas:
    docintel_schema:
      catalog_name: ${var.catalog}
      name: ${var.schema}
      comment: "10-K Analyst — Document Intelligence + Agent Bricks"

  volumes:
    raw_filings:
      catalog_name: ${var.catalog}
      schema_name: ${var.schema}
      name: raw_filings
      volume_type: MANAGED
      comment: "Drop-zone for raw 10-K PDFs. 90-day retention via retention.job.yml."

# UC privilege grants (USE_SCHEMA, SELECT, EXECUTE on schema; READ_VOLUME/WRITE_VOLUME on volume)
# are NOT a DAB resource type as of CLI 0.298. Apply them post-deploy from a SQL warehouse:
#
#   GRANT USE_SCHEMA, SELECT, EXECUTE ON SCHEMA `${var.catalog}`.`${var.schema}`
#     TO `${var.analyst_group}`;
#   GRANT READ_VOLUME, WRITE_VOLUME ON VOLUME `${var.catalog}`.`${var.schema}`.`raw_filings`
#     TO `${var.analyst_group}`;
#
# See docs/runbook.md for the full grant script.
