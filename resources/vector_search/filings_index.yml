resources:
  vector_search_endpoints:
    docintel_vs:
      name: docintel-${bundle.target}
      endpoint_type: STANDARD

  vector_search_indexes:
    filings_summary_idx:
      name: ${var.catalog}.${var.schema}.filings_summary_idx
      endpoint_name: docintel-${bundle.target}
      primary_key: section_uid
      index_type: DELTA_SYNC
      delta_sync_index_spec:
        source_table: ${var.catalog}.${var.schema}.gold_filing_sections_indexable
        pipeline_type: TRIGGERED
        embedding_source_columns:
          - name: summary
            embedding_model_endpoint_name: ${var.embedding_model_endpoint_name}
        columns_to_sync:
          - section_uid
          - filename
          - section_seq
          - section_label
          - original_label
          - summary
          - quality_score
          - embed_eligible
