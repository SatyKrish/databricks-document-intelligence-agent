resources:
  database_instances:
    docintel_state:
      name: ${var.lakebase_instance}
      capacity: CU_1
      node_count: 1
      retention_window_in_days: 7
      stopped: false

  database_catalogs:
    docintel_state_catalog:
      name: ${var.lakebase_instance}
      database_instance_name: ${var.lakebase_instance}
      database_name: ${var.lakebase_instance}
      create_database_if_not_exists: true
