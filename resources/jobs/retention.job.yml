resources:
  jobs:
    retention_90d:
      name: doc-intel-retention-90d-${bundle.target}

      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: UTC

      tasks:
        - task_key: prune_volume
          spark_python_task:
            python_file: ../../jobs/retention/prune_volume.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--schema"
              - ${var.schema}
              - "--volume"
              - raw_filings
              - "--days"
              - "90"
          environment_key: prune_env

      environments:
        - environment_key: prune_env
          spec:
            client: "1"
            dependencies:
              - databricks-sdk>=0.40

      permissions:
        - level: CAN_VIEW
          group_name: ${var.analyst_group}
