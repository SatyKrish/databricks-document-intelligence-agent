# Databricks Apps runtime config — Streamlit.
# Skill alignment:
#   .claude/skills/databricks-apps/references/other-frameworks.md §1 (port/host)
#   .claude/skills/databricks-apps/references/other-frameworks.md §8 (Streamlit env vars)

command:
  - streamlit
  - run
  - app/app.py
  - --server.port
  - "${DATABRICKS_APP_PORT:-8000}"
  - --server.address
  - "0.0.0.0"

env:
  # Disable Streamlit's CORS + XSRF self-checks. The Apps reverse-proxy origin
  # (*.databricksapps.com) differs from the workspace origin, which trips
  # Streamlit's protections without these flags. Skill §8.
  - name: STREAMLIT_SERVER_ENABLE_CORS
    value: "false"
  - name: STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION
    value: "false"

  # Resolved at runtime from the resource bindings declared in
  # resources/apps/analyst.app.yml. The bindings are target-aware
  # (analyst-agent-${bundle.target}) so dev and prod stay isolated.
  - name: DOCINTEL_AGENT_ENDPOINT
    valueFrom: agent-endpoint
