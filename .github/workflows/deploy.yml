name: deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      - name: Validate bundle (dev)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate -t dev

  deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DOCINTEL_CATALOG: ${{ vars.DOCINTEL_CATALOG }}
      DOCINTEL_SCHEMA: ${{ vars.DOCINTEL_SCHEMA }}
      DOCINTEL_WAREHOUSE_ID: ${{ vars.DOCINTEL_WAREHOUSE_ID }}
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      - name: Install Python deps
        run: |
          pip install -r agent/requirements.txt -r evals/requirements.txt

      - name: Stage 1 — deploy foundation only (consumers temp-renamed out)
        # Foundation has no data dependencies; deploys cleanly. Consumers are
        # renamed to *.yml.skip so the bundle's resources/**/*.yml glob skips
        # them. They get restored at the end of this step.
        run: |
          for f in resources/consumers/*.yml; do mv "$f" "$f.skip"; done
          trap 'for f in resources/consumers/*.yml.skip; do mv "$f" "${f%.skip}"; done' EXIT
          databricks bundle deploy -t dev

      - name: Stage 1.5 — produce data
        run: |
          for f in samples/*_10K_*.pdf; do
            databricks fs cp "$f" \
              "dbfs:/Volumes/${DOCINTEL_CATALOG}/${DOCINTEL_SCHEMA}/raw_filings/" \
              --overwrite
          done
          databricks bundle run -t dev doc_intel_pipeline
          python scripts/wait_for_kpis.py --min-rows 3 --timeout 900
          python agent/log_and_register.py --target dev

      - name: Stage 2 — deploy full bundle (consumers attach to live foundation)
        run: databricks bundle deploy -t dev

      - name: Apply post-deploy UC grants (catalog + schema; not DAB-supported)
        # UC requires the full chain: USE_CATALOG → USE_SCHEMA → SELECT/EXECUTE.
        # Defaults to "account users" so CI does not silently skip when the
        # GitHub variable is unset.
        env:
          ANALYST_GROUP: ${{ vars.DOCINTEL_ANALYST_GROUP || 'account users' }}
        run: |
          databricks api patch \
            "/api/2.1/unity-catalog/permissions/CATALOG/${DOCINTEL_CATALOG}" \
            --json "{\"changes\":[{\"principal\":\"${ANALYST_GROUP}\",\"add\":[\"USE_CATALOG\"]}]}" || true
          databricks api patch \
            "/api/2.1/unity-catalog/permissions/SCHEMA/${DOCINTEL_CATALOG}.${DOCINTEL_SCHEMA}" \
            --json "{\"changes\":[{\"principal\":\"${ANALYST_GROUP}\",\"add\":[\"USE_SCHEMA\",\"SELECT\",\"EXECUTE\"]}]}" || true

      - name: Apply app config + restart (canonical apps deploy command)
        # Databricks Apps deploy docs:
        # https://docs.databricks.com/aws/en/dev-tools/databricks-apps/deploy
        # `bundle deploy` alone uploads code but doesn't apply config/restart.
        run: databricks bundle run -t dev analyst_app

      - name: Verify OBO scopes survived deploy
        # `bundle run` may wipe user_api_scopes (documented destructive-update
        # behavior — see Databricks Apps deploy docs). Fail loudly so we
        # re-apply. Asserts the full set required by the agent's call chain
        # (serving + sql), not just sql. Skipped when user_api_scopes are
        # not declared (workspace feature off).
        run: |
          if grep -q '^      user_api_scopes:' resources/consumers/analyst.app.yml; then
            databricks apps get doc-intel-analyst-dev --output json > /tmp/app.json
            python -c "
import json
app = json.load(open('/tmp/app.json'))
scopes = set(app.get('user_api_scopes') or [])
required = {'serving.serving-endpoints', 'sql'}
missing = required - scopes
assert not missing, f'OBO scopes missing: {sorted(missing)} (got {sorted(scopes)})'
"
          else
            echo "user_api_scopes not declared (workspace feature off); skipping OBO scope check"
          fi

      - name: CLEARS evaluation gate
        run: python evals/clears_eval.py --endpoint analyst-agent-dev --dataset evals/dataset.jsonl
